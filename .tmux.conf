# ------------------------- general
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g focus-events on

# ------------------------- prefix
set -g prefix C-s
unbind C-b
bind C-s send-prefix

# ------------------------- mouse
set -g mouse on

# ------------------------- index
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ------------------------- key binding
setw -g mode-keys vi

# ----------- pane split
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ----------- pane navigation (vim-like)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ----------- pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ----------- new window with current path
bind c new-window -c "#{pane_current_path}"

# ----------- reload config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# ----------- copy mode (vi)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ------------------------- status bar
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour248"

# ----------- left
set -g status-left-length 30
set -g status-left "#[fg=colour232,bg=colour39,bold] #S #[fg=colour39,bg=colour235] "

# ----------- right
set -g status-right-length 50
set -g status-right "#[fg=colour248] %Y-%m-%d %H:%M #[fg=colour232,bg=colour39,bold] #H "

# ----------- window
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour232,bg=colour39,bold] #I:#W "

# ------------------------- pane border
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"
